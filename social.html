  <script type="module">
import {
  DDC_updateTime,
  DDC_getCurrentTimesliceDetails,
  DDC_globalBackgrounds,
  DDC_introBackgrounds,
  DDC_globalTextColors,
  DDC_getLiteralEarthValue,
  DDC_getLiteralMoonValue,
  DDC_getLiteralTideValue,
  DDC_backgroundAudio
} from 'https://niccolosegato.github.io/unverse-assets/scripts/export.js';
let DDC_GLOBAL_AUDIO;
let DDC_OBJECT_AUDIO;
let isPlaying = false;
let currentMoodGen = DDC_getCurrentTimesliceDetails().DDC_activeMood;
const img = new Image();
const polaroidImg = new Image();
const canvasGenerated = document.createElement("canvas");
let canvas;
let ctx;
let outputImage;
let imagesLoadedCount = 0;
const totalImagesToLoad = 2;
document.addEventListener("DOMContentLoaded", function() {
	const params = new URLSearchParams(window.location.search);
  if (params.has('m')) {
    const mValue = params.get('m');
    currentMoodGen = mValue;
  }
  let bodyElement = document.getElementsByTagName("body")[0];
  if (DDC_globalBackgrounds[currentMoodGen - 1].includes("gradient")) {
    bodyElement.style.backgroundImage = DDC_globalBackgrounds[currentMoodGen - 1];
    bodyElement.style.backgroundSize = "cover";
    bodyElement.style.backgroundRepeat = "no-repeat";
    bodyElement.style.backgroundColor = ""; // reset
  } else {
    bodyElement.style.background = DDC_globalBackgrounds[currentMoodGen - 1];
    bodyElement.style.backgroundImage = ""; // reset
  }
  // Imposto il video di sfondo
  document.getElementById("social-video-background").src = "https://github.com/NiccoloSegato/unverse-assets/raw/refs/heads/main/assets/social/" + currentMoodGen + ".webm";
  DDC_updateTime();
  setInterval(DDC_updateTime, 1000);
  // Genero il canvas
  img.crossOrigin = "anonymous";
  img.src = "https://unverse-assets.web.app/background/" + currentMoodGen + ".png";
  //img.src = "https://github.com/NiccoloSegato/unverse-assets/raw/refs/heads/main/assets/generator/" + currentMoodGen + ".png";
  //img.src = "https://github.com/NiccoloSegato/unverse-assets/raw/refs/heads/main/assets/generator/" + currentMoodGen + ".png";
  canvasGenerated.id = "generator-canvas";
  document.getElementById("canvas-container").append(canvasGenerated);
  canvas = document.getElementById("generator-canvas");
  ctx = canvas.getContext("2d");
  outputImage = document.getElementById("generated-image");
  polaroidImg.crossOrigin = "anonymous";
  polaroidImg.src = getRandomPolaroidImage();
  img.onload = drawImagesOnCanvas;
	polaroidImg.onload = drawImagesOnCanvas;
  // Cambio colore alla UI
  if(currentMoodGen == 1 || currentMoodGen == 4) {
	  document.getElementById("footer-time-label").style.color = "white";
	  document.getElementById("share-heading").style.color = "white";
	  document.getElementById("share-p").style.color = "white";
  }
   /***** BACKGROUND AUDIO *****/
     DDC_GLOBAL_AUDIO = new Audio(DDC_backgroundAudio[currentMoodGen - 1]);
     DDC_GLOBAL_AUDIO.loop = true;
      DDC_GLOBAL_AUDIO.volume = 0; // Inizia da volume 0
      DDC_GLOBAL_AUDIO.muted = false;
      const btn = document.querySelector('#sound');
      isPlaying = true;
          DDC_GLOBAL_AUDIO.play();
          // Fade in di 8 secondi - inizia quando parte l'audio
          let currentVolume = 0;
          const targetVolume = 0.50;
          const fadeTime = 8000; // 8 secondi
          const steps = 100;
          const volumeStep = targetVolume / steps;
          const timeStep = fadeTime / steps;
          const fadeInterval = setInterval(() => {
              currentVolume += volumeStep;
              if (currentVolume >= targetVolume) {
                  currentVolume = targetVolume;
                  clearInterval(fadeInterval);
              }
              DDC_GLOBAL_AUDIO.volume = currentVolume;
          }, timeStep);
     btn.addEventListener('click', function() {
         if (isPlaying) {
             DDC_GLOBAL_AUDIO.muted = true;
             isPlaying = false;
         } else {
             DDC_GLOBAL_AUDIO.muted = false;
             isPlaying = true;
         }
     });
     /***** FINE AUDIO *****/
});
function getRandomPolaroidImage() {
  const randomIndex = Math.floor(Math.random() * 4) + 1;
  return "https://unverse-assets.web.app/polaroid/" + currentMoodGen + "/" + randomIndex + ".png";
}
// Funzione per disegnare le immagini sul canvas una volta caricate
function drawImagesOnCanvas() {
  imagesLoadedCount++;
  if (imagesLoadedCount === totalImagesToLoad) {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0); // Disegna l'immagine di sfondo
    DDC_genSocialImage();
  }
}
function DDC_genSocialImage(){
    // Quando clicchi il bottone, ridisegna tutto per assicurarti che il testo si aggiunga correttamente
    canvas.width = img.width; // Ridisegna lo sfondo
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    // Ridisegna l'immagine "polaroid focus" dopo aver ridisegnato lo sfondo
    const focusImgWidth = 750;
    const focusImgHeight = 1100;
    const focusImgX = 170;
    const focusImgY = 320;
    /*ctx.drawImage(polaroidImg, focusImgX, focusImgY, focusImgWidth, focusImgHeight);*/
    // Calcola il rapporto di scala per "contain"
    const maxW = 750;
    const maxH = 1100;
    const naturalW = polaroidImg.width;
    const naturalH = polaroidImg.height;
    const scale = Math.min(maxW / naturalW, maxH / naturalH);
    const drawW = naturalW * scale;
    const drawH = naturalH * scale;
    // Centra l'immagine nel box target (optional)
    const offsetX = focusImgX + (maxW - drawW) / 2;
    const offsetY = focusImgY + (maxH - drawH) / 2;
    ctx.drawImage(polaroidImg, offsetX, offsetY, drawW, drawH);
    // Data
    ctx.font = "40px 'HK Grotesk'";
    ctx.fillStyle = (currentMoodGen == 1 || currentMoodGen == 4) ? "white" : "black";
    //ctx.strokeStyle = (currentMoodGen == 1 || currentMoodGen == 4) ? "black" : "white";
    ctx.textAlign = "left";
    ctx.textBaseline = "bottom";
    ctx.lineWidth = 2;
    // Inizio della modifica
    const today = new Date(); // Ottiene la data e l'ora attuali
    const day = String(today.getDate()).padStart(2, '0'); // Giorno del mese (es. 05)
    const month = String(today.getMonth() + 1).padStart(2, '0'); // Mese (aggiungi 1 perché è base 0, es. 07)
    const year = today.getFullYear(); // Anno completo (es. 2025)
    const text = `${day}-${month}-${year}`; // Formatta la data come "GG-MM-AAAA"
    // Fine della modifica
    const x = 795;
    const y = img.height - 50;
    ctx.strokeText(text, x, y);
    ctx.fillText(text, x, y);
    // variabile 1
    const thirdText = DDC_getLiteralEarthValue() + "°";
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const thirdX = 310;
    const thirdY = img.height - 250;
    ctx.strokeText(thirdText, thirdX, thirdY);
    ctx.fillText(thirdText, thirdX, thirdY);
    // orario
    // Inizio della modifica
    const now = new Date(); // Ottiene la data e l'ora attuali
    const hours = String(now.getHours()).padStart(2, '0'); // Ore (es. 17)
    const minutes = String(now.getMinutes()).padStart(2, '0'); // Minuti (es. 44)
    const seconds = String(now.getSeconds()).padStart(2, '0'); // Secondi (es. 22)
    const secondText = `${hours}:${minutes}:${seconds}`; // Formatta l'orario come "HH:MM:SS"
    // Fine della modifica
    ctx.textAlign = "right";
    ctx.textBaseline = "bottom";
    const secondX = 235;
    const secondY = img.height - 1720;
    ctx.strokeText(secondText, secondX, secondY);
    ctx.fillText(secondText, secondX, secondY);
      // Luna
    const fourthText = DDC_getLiteralMoonValue();
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const fourthX = 540;
    const fourthY = img.height - 250;
    ctx.strokeText(fourthText, fourthX, fourthY);
    ctx.fillText(fourthText, fourthX, fourthY);
     // marea
    const fifthText = DDC_getLiteralTideValue();
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const fifthX = 770;
    const fifthY = img.height - 250;
    ctx.strokeText(fifthText, fifthX, fifthY);
    ctx.fillText(fifthText, fifthX, fifthY);
    // Genera immagine finale
    const dataURL = canvas.toDataURL("image/png");
    const outputImage = document.getElementById("generated-image");
    outputImage.src = dataURL;
    outputImage.style.display = "block";
    canvas.style.display = "none"; // Nasconde il canvas
};
/***** RITORNO ALLA PAGINA DOPO IL CLICK DELLA FRECCIA INDIETRO *****/
window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      DDC_GLOBAL_AUDIO.play();
      DDC_GLOBAL_AUDIO.muted = false;
      isPlaying = true;
      document.getElementById("sound").classList.remove("stoppedSound");
      document.getElementById("sound").style.pointerEvents = "auto";
    }
});
</script>
